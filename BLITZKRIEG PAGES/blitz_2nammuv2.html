<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>II. Nammu - Bigger Model</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #0a0a0f; font-family: sans-serif; }
        canvas { display: block; }
        .info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 2px;
            text-align: center;
            pointer-events: none;
            font-weight: 300;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            letter-spacing: 2px;
            font-family: sans-serif;
            z-index: 10;
            text-align: center;
        }
        .loading span {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="loading" id="loading">
        Loading 3D Model...
        <span>Generating surface particles...</span>
    </div>
    <div class="info">The Mother</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // --- SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('grey');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();
        const backgroundTexture = textureLoader.load('https://raw.githubusercontent.com/duckidouk/WEBSITE/refs/heads/main/CONTENT/BG/0223f3fcf192f28b6a0d6bc814e7d881.gif');
        scene.background = backgroundTexture;

        // --- MOUSE TRACKING ---
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        const prevMouse = { x: 0, y: 0 };
        const velocity = { x: 0, y: 0 };

        document.addEventListener('mousemove', (e) => {
            prevMouse.x = mouse.targetX;
            prevMouse.y = mouse.targetY;
            mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
            velocity.x = (mouse.targetX - prevMouse.x) * 2;
            velocity.y = (mouse.targetY - prevMouse.y) * 2;
        });

        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            prevMouse.x = mouse.targetX;
            prevMouse.y = mouse.targetY;
            mouse.targetX = (touch.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(touch.clientY / window.innerHeight) * 2 + 1;
            velocity.x = (mouse.targetX - prevMouse.x) * 2;
            velocity.y = (mouse.targetY - prevMouse.y) * 2;
        }, { passive: true });

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);
        const light1 = new THREE.DirectionalLight(0xff6b6b, 1.5);
        light1.position.set(2, 3, 4);
        scene.add(light1);
        const light2 = new THREE.DirectionalLight(0x4a6bff, 0.8);
        light2.position.set(-3, -1, 2);
        scene.add(light2);

        // --- SURFACE SAMPLING FUNCTION ---
        function sampleSurface(geometry, numParticles = 10000) {
            const posAttr = geometry.attributes.position;
            if (!posAttr) return null;

            const positions = posAttr.array;
            const vertexCount = positions.length / 3;

            const indexAttr = geometry.index;
            let triangles = [];

            if (indexAttr) {
                const indices = indexAttr.array;
                for (let i = 0; i < indices.length; i += 3) {
                    triangles.push([
                        indices[i] * 3,
                        indices[i + 1] * 3,
                        indices[i + 2] * 3
                    ]);
                }
            } else {
                for (let i = 0; i < positions.length; i += 9) {
                    triangles.push([i, i + 3, i + 6]);
                }
            }

            console.log(`📐 Found ${triangles.length} triangles`);

            const sampledPoints = [];
            const triangleCount = triangles.length;
            const samplesPerTriangle = Math.max(1, Math.floor(numParticles / triangleCount));
            const totalSamples = Math.min(numParticles, triangleCount * samplesPerTriangle);

            for (let t = 0; t < triangleCount && sampledPoints.length / 3 < totalSamples; t++) {
                const [i1, i2, i3] = triangles[t];
                const v1 = new THREE.Vector3(positions[i1], positions[i1 + 1], positions[i1 + 2]);
                const v2 = new THREE.Vector3(positions[i2], positions[i2 + 1], positions[i2 + 2]);
                const v3 = new THREE.Vector3(positions[i3], positions[i3 + 1], positions[i3 + 2]);

                const samplesOnTriangle = Math.min(
                    samplesPerTriangle,
                    Math.ceil((totalSamples - sampledPoints.length / 3) / (triangleCount - t))
                );

                for (let s = 0; s < samplesOnTriangle; s++) {
                    let u = Math.random();
                    let v = Math.random();
                    if (u + v > 1) {
                        u = 1 - u;
                        v = 1 - v;
                    }
                    const w = 1 - u - v;
                    const point = new THREE.Vector3()
                        .addScaledVector(v1, u)
                        .addScaledVector(v2, v)
                        .addScaledVector(v3, w);
                    sampledPoints.push(point.x, point.y, point.z);
                }
            }

            console.log(`✅ Sampled ${sampledPoints.length / 3} surface points`);
            return sampledPoints;
        }

        // --- CREATE PARTICLE SYSTEM FROM SAMPLED POINTS ---
        function createParticlesFromPoints(points, color = { r: 1, g: 0.6, b: 0.4 }) {
            const count = points.length / 3;
            const colors = [];
            const sizes = [];
            const particleData = [];

            for (let i = 0; i < count; i++) {
                const brightness = 0.7 + Math.random() * 0.3;
                colors.push(
                    color.r * brightness,
                    color.g * brightness,
                    color.b * brightness
                );
                sizes.push(0.05 + Math.random() * 0.045);

                particleData.push({
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.5 + Math.random() * 1.5,
                    amplitude: 0.005 + Math.random() * 0.02,
                    originalColor: [
                        color.r * brightness,
                        color.g * brightness,
                        color.b * brightness
                    ]
                });
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            const posArray = geometry.attributes.position.array;
            const origPositions = new Float32Array(posArray);
            geometry.userData.origPositions = origPositions;
            geometry.userData.particleData = particleData;

            return geometry;
        }

        // --- SHADERS ---
        const vertexShader = `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (560.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            void main() {
                vec2 center = gl_PointCoord - vec2(0.5);
                float dist = length(center);
                if (dist > 0.5) discard;
                float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                float glow = exp(-dist * 8.0);
                gl_FragColor = vec4(vColor * (0.8 + glow * 0.4), alpha * 0.9);
            }
        `;

        const material = new THREE.ShaderMaterial({
            uniforms: {},
            vertexShader,
            fragmentShader,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });

        // --- LOAD MODEL AND GENERATE PARTICLES ---
        let particleSystem = null;
        let modelGroup = new THREE.Group();
        scene.add(modelGroup);

        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');

        // ✅ INCREASE THIS VALUE TO MAKE THE MODEL BIGGER
        // The particles will automatically wrap around the scaled model
        const MODEL_SCALE = 1.8;  // Changed from 0.5 to 0.8

        loader.load(
            'https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/foetus_pod.glb',
            (gltf) => {
                const model = gltf.scene;

                // Scale the model
                model.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
                model.position.set(0, 0, 0);
                model.updateMatrixWorld(true);

                let allPoints = [];

                model.traverse((node) => {
                    if (node.isMesh) {
                        console.log(`🔄 Processing mesh: ${node.name || 'unnamed'}`);
                        const geo = node.geometry.clone();
                        geo.applyMatrix4(node.matrixWorld);
                        const points = sampleSurface(geo, 8000);
                        if (points) {
                            allPoints = allPoints.concat(points);
                        }
                    }
                });

                console.log(`📊 Total points collected: ${allPoints.length / 3}`);

                if (allPoints.length > 0) {
                    const particleGeo = createParticlesFromPoints(allPoints);
                    particleSystem = new THREE.Points(particleGeo, material);
                    modelGroup.add(particleSystem);

                    loadingDiv.style.display = 'none';
                    console.log(`✅ Created particle system with ${allPoints.length / 3} particles`);
                } else {
                    loadingDiv.innerHTML = '⚠️ No surface points generated';
                }
            },
            (xhr) => {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                loadingDiv.innerHTML = `Loading 3D Model... ${percent}%<span>Sampling surface...</span>`;
            },
            (error) => {
                console.error('❌ Error loading model:', error);
                loadingDiv.innerHTML = '⚠️ Failed to load model.<span>Check console for details</span>';
                loadingDiv.style.color = 'rgba(255, 100, 100, 0.8)';
            }
        );

        // --- ANIMATION ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            mouse.x += (mouse.targetX - mouse.x) * 0.05;
            mouse.y += (mouse.targetY - mouse.y) * 0.05;

            velocity.x *= 0.9;
            velocity.y *= 0.9;

            const sizeMultiplier = 1 + Math.abs(mouse.x) * 0.9;

            if (particleSystem) {
                const positions = particleSystem.geometry.attributes.position.array;
                const orig = particleSystem.geometry.userData.origPositions;
                const colors = particleSystem.geometry.attributes.color.array;
                const particleData = particleSystem.geometry.userData.particleData;

                // Mouse position in 3D space - scaled to match model size
                const mouseX3D = mouse.x * 1.5 * MODEL_SCALE;
                const mouseY3D = mouse.y * 1.2 * MODEL_SCALE;

                for (let i = 0; i < positions.length; i += 3) {
                    const idx = i / 3;
                    const origX = orig[i];
                    const origY = orig[i + 1];
                    const origZ = orig[i + 2];

                    // Distance from particle to mouse
                    const dx = origX - mouseX3D;
                    const dy = origY - mouseY3D;
                    const dz = origZ;
                    const distToMouse = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    // Mouse influence - scaled with model
                    const mouseRadius = 0.8 * MODEL_SCALE;
                    const mouseStrength = 2;
                    let mouseInfluence = 0;
                    let mouseDirectionX = 0;
                    let mouseDirectionY = 0;

                    if (distToMouse < mouseRadius) {
                        const force = (1 - distToMouse / mouseRadius) * mouseStrength;
                        mouseInfluence = force;
                        if (distToMouse > 0.001) {
                            mouseDirectionX = dx / distToMouse;
                            mouseDirectionY = dy / distToMouse;
                        }
                    }

                    // Wind effect
                    const windStrength = 0.00;
                    const windX = velocity.x * windStrength * MODEL_SCALE;
                    const windY = velocity.y * windStrength * MODEL_SCALE;

                    // Per-particle animation - scaled amplitudes
                    const data = particleData[idx];
                    const phase = data.phase + time * data.speed;
                    const dist = Math.sqrt(origX*origX + origY*origY + origZ*origZ);
                    const ripple = Math.sin(dist * 5 - time * 1.2 + phase) * data.amplitude * 2 * MODEL_SCALE;
                    const wave = Math.sin(origX * 4 + origZ * 3 + time * 1.8) * 0.008 * MODEL_SCALE;
                    const breathe = Math.sin(time * 0.5 + dist * 2 + phase * 0.3) * 0.006 * MODEL_SCALE;

                    // Combined displacement
                    const displaceX = ripple * origX * 0.3 + wave * origZ * 0.5 + breathe * origX;
                    const displaceY = ripple * origY * 0.3 + wave * origX * 0.3 + breathe * origY * 1.2;
                    const displaceZ = ripple * origZ * 0.3 + wave * origX * 0.4 + breathe * origZ;

                    // Apply mouse push
                    const pushX = mouseDirectionX * mouseInfluence * 0.5;
                    const pushY = mouseDirectionY * mouseInfluence * 0.5;

                    // Apply wind
                    const windEffectX = windX * (1 + origY * 0.5);
                    const windEffectY = windY * (1 + origX * 0.5);

                    positions[i] = origX + displaceX + pushX + windEffectX;
                    positions[i + 1] = origY + displaceY + pushY + windEffectY;
                    positions[i + 2] = origZ + displaceZ + pushX * 0.3 + windEffectX * 0.2;

                    // Animate colors
                    const glowAmount = Math.max(0, 1 - distToMouse / mouseRadius) * 0.5;
                    const baseR = data.originalColor[0];
                    const baseG = data.originalColor[1];
                    const baseB = data.originalColor[2];

                    const hueShift = Math.sin(time * 0.2 + origY * 3) * 0.05;

                    colors[i] = Math.min(1, baseR + glowAmount * 0.5 + hueShift);
                    colors[i + 1] = Math.min(1, baseG + glowAmount * 0.3 - hueShift * 0.3);
                    colors[i + 2] = Math.min(1, baseB + glowAmount * 0.2 - hueShift * 0.2);
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleSystem.geometry.attributes.color.needsUpdate = true;
            }

            // Rotate with mouse
            modelGroup.rotation.y = Math.sin(time * 0.06) * 0.15 + mouse.x * 0.35;
            modelGroup.rotation.x = Math.sin(time * 0.04 + 0.5) * 0.06 + mouse.y * 0.2;
            modelGroup.rotation.z = -velocity.x * 0.02;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        console.log('✨ Interactive surface system running!');
    </script>
</body>
</html>
