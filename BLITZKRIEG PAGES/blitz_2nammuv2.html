<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>II. Nammu - Demons</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #0a0a0f; font-family: sans-serif; }
        canvas { display: block; }

        /* TOP TEXT - "demons" */
        .top-text {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 30px;
            letter-spacing: 4px;
            text-align: center;
            font-weight: 300;
            font-family: 'Open Sans', sans-serif;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }
        .top-text:hover {
            opacity: 0.6;
        }

        /* BOTTOM TEXT - "the mother" */
        .bottom-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 30px;
            letter-spacing: 4px;
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            font-weight: 300;
            font-family: 'Open Sans', sans-serif;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        .bottom-text:hover {
            opacity: 0.6;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            letter-spacing: 2px;
            font-family: sans-serif;
            z-index: 10;
            text-align: center;
        }
        .loading span {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.5;
        }
        .error {
            color: rgba(255, 100, 100, 0.8) !important;
        }
    </style>
</head>
<body>

    <div class="loading" id="loading">
        Loading 3D Model...
        <span>Generating surface particles...</span>
    </div>

    <!-- ✅ TOP TEXT - "demons" (clickable) -->
    <div class="top-text" id="demonsLink">demons</div>

    <!-- ✅ BOTTOM TEXT - "the mother" (clickable) -->
    <div class="bottom-text" id="motherLink">the mother</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // --- CUSTOM URL FOR "demons" CLICK ---
        // ✅ CHANGE THIS TO YOUR DESIRED URL
        const DEMONS_URL = 'https://your-custom-url.com';

        document.getElementById('demonsLink').addEventListener('click', () => {
            window.open(DEMONS_URL, '_blank');
            // OR use this to open in the same tab:
            // window.location.href = DEMONS_URL;
        });

        // --- BACKGROUND SOUND (loops when you click) ---
        // ✅ CHANGE THIS TO YOUR BACKGROUND SOUND URL
        const BG_SOUND_URL = 'https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_piano_up.mp3';
        let bgAudioContext = null;
        let bgSource = null;
        let bgGainNode = null;
        let isBgPlaying = false;

        // --- SOUND FOR CLICKING "the mother" ---
        // ✅ CHANGE THIS TO YOUR CLICK SOUND URL
        const CLICK_SOUND_URL = 'https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_piano_up.mp3';
        let clickSoundBuffer = null;

        // --- CUSTOM SOUND SETUP (particle interaction) ---
        let audioContext = null;
        let lastPlayTime = 0;
        const MIN_INTERVAL = 0.08;
        let audioEnabled = false;
        let soundBuffer = null;

        // ✅ YOUR SOUND URL - KEEP THIS!
        const SOUND_URL = 'https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_fuck.mp3';

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            audioEnabled = true;
            console.log('🔊 Audio initialized!');
        }

        // --- LOAD BACKGROUND SOUND ---
        async function loadBackgroundSound() {
            try {
                console.log('🔊 Loading background sound from:', BG_SOUND_URL);
                const response = await fetch(BG_SOUND_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const arrayBuffer = await response.arrayBuffer();
                if (!bgAudioContext) {
                    bgAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const bgBuffer = await bgAudioContext.decodeAudioData(arrayBuffer);
                console.log('✅ Background sound loaded successfully!');
                console.log('📢 Background duration:', bgBuffer.duration, 'seconds');

                // Store the buffer for later use
                window._bgBuffer = bgBuffer;
            } catch (error) {
                console.warn('⚠️ Failed to load background sound:', error);
                console.log('📁 Make sure your sound file is at:', BG_SOUND_URL);
            }
        }

        // --- LOAD CLICK SOUND ---
        async function loadClickSound() {
            try {
                console.log('🔊 Loading click sound from:', CLICK_SOUND_URL);
                const response = await fetch(CLICK_SOUND_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const arrayBuffer = await response.arrayBuffer();
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                clickSoundBuffer = await audioContext.decodeAudioData(arrayBuffer);
                console.log('✅ Click sound loaded successfully!');
            } catch (error) {
                console.warn('⚠️ Failed to load click sound:', error);
                console.log('📁 Make sure your sound file is at:', CLICK_SOUND_URL);
            }
        }

        // --- PLAY BACKGROUND SOUND (loops) ---
        function playBackgroundSound() {
            if (isBgPlaying) {
                // If already playing, stop it
                stopBackgroundSound();
                return;
            }

            if (!window._bgBuffer) {
                console.warn('⚠️ Background sound not loaded yet');
                return;
            }

            try {
                if (!bgAudioContext) {
                    bgAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (bgAudioContext.state === 'suspended') {
                    bgAudioContext.resume();
                }

                // Create source and gain node for volume control
                bgSource = bgAudioContext.createBufferSource();
                bgGainNode = bgAudioContext.createGain();

                bgSource.buffer = window._bgBuffer;
                bgSource.loop = true; // ✅ LOOP ENABLED

                // Connect: source -> gain -> destination
                bgSource.connect(bgGainNode);
                bgGainNode.connect(bgAudioContext.destination);

                // Set volume (0.0 to 1.0)
                bgGainNode.gain.setValueAtTime(0.3, bgAudioContext.currentTime);

                bgSource.start(0);
                isBgPlaying = true;
                console.log('▶️ Background sound started (looping)');
            } catch (e) {
                console.warn('Background playback error:', e);
            }
        }

        // --- STOP BACKGROUND SOUND ---
        function stopBackgroundSound() {
            try {
                if (bgSource) {
                    bgSource.stop();
                    bgSource = null;
                }
                isBgPlaying = false;
                console.log('⏹️ Background sound stopped');
            } catch (e) {
                console.warn('Stop error:', e);
            }
        }

        // --- PLAY CLICK SOUND (for "the mother") ---
        function playClickSound() {
            if (!audioEnabled) {
                initAudio();
            }

            if (!clickSoundBuffer) {
                console.warn('⚠️ Click sound not loaded yet');
                // Fallback: play a beep
                try {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                } catch (e) {
                    console.warn('Fallback click error:', e);
                }
                return;
            }

            try {
                const source = audioContext.createBufferSource();
                source.buffer = clickSoundBuffer;

                const gainNode = audioContext.createGain();
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                source.start(audioContext.currentTime);
            } catch (e) {
                console.warn('Click sound playback error:', e);
            }
        }

        // --- CLICK EVENT FOR "the mother" ---
        document.getElementById('motherLink').addEventListener('click', () => {
            playClickSound();
            playBackgroundSound(); // Toggle background sound on/off
        });

        // --- LOAD ALL SOUNDS ---
        loadSound();         // Particle interaction sound
        loadBackgroundSound(); // Background looping sound
        loadClickSound();     // Click sound for "the mother"

        async function loadSound() {
            try {
                console.log('🔊 Loading sound from:', SOUND_URL);
                const response = await fetch(SOUND_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const arrayBuffer = await response.arrayBuffer();
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                soundBuffer = await audioContext.decodeAudioData(arrayBuffer);
                console.log('✅ Custom sound loaded successfully!');
                console.log('📢 Sound duration:', soundBuffer.duration, 'seconds');
            } catch (error) {
                console.warn('⚠️ Failed to load custom sound:', error);
                console.log('💡 Using fallback synthesized sound');
                console.log('📁 Make sure your sound file is at:', SOUND_URL);
            }
        }

        function playInteractionSound(intensity) {
            if (!audioEnabled) return;
            if (intensity < 0.1) return;

            const now = performance.now() / 1000;
            if (now - lastPlayTime < MIN_INTERVAL) return;
            lastPlayTime = now;

            try {
                if (soundBuffer) {
                    // ✅ PLAY CUSTOM SOUND
                    const source = audioContext.createBufferSource();
                    source.buffer = soundBuffer;

                    const gainNode = audioContext.createGain();
                    source.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    // Volume based on intensity (0 to 0.4)
                    const volume = Math.min(0.4, intensity * 0.5);
                    gainNode.gain.setValueAtTime(volume, audioContext.currentTime);

                    // Optional: pitch shift based on intensity
                    source.playbackRate.value = 0.8 + intensity * 0.4;

                    source.start(audioContext.currentTime);
                } else {
                    // ✅ FALLBACK: Synthesized sound
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    oscillator.type = 'sine';
                    const frequency = 200 + intensity * 600;
                    oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);

                    const volume = Math.min(0.2, intensity * 0.3);
                    gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.08);

                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.08);
                }
            } catch (e) {
                console.warn('Sound playback error:', e);
            }
        }

        // --- AUTO-INITIALIZE AUDIO ON FIRST USER INTERACTION ---
        function autoInitAudio() {
            if (!audioEnabled) {
                initAudio();
                console.log('🔊 Sound activated by user interaction!');
            }
        }

        document.addEventListener('click', autoInitAudio);
        document.addEventListener('keydown', autoInitAudio);
        document.addEventListener('touchstart', autoInitAudio);

        // --- SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- BACKGROUND IMAGE ---
        const textureLoader = new THREE.TextureLoader();
        const bgImageUrl = 'https://raw.githubusercontent.com/duckidouk/WEBSITE/refs/heads/main/CONTENT/BG/tumblr_3d77597812864bbe95244ca56e04f876_2b32b4c9_400.jpg';

        textureLoader.load(
            bgImageUrl,
            (texture) => {
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(4, 4);
                scene.background = texture;
                console.log('✅ Background image loaded from GitHub!');
            },
            undefined,
            (error) => {
                console.warn('⚠️ Background image failed to load, using fallback color:', error);
                scene.background = new THREE.Color(0x0a0a0f);
            }
        );

        // --- MOUSE TRACKING ---
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        const prevMouse = { x: 0, y: 0 };
        const velocity = { x: 0, y: 0 };

        document.addEventListener('mousemove', (e) => {
            autoInitAudio();

            prevMouse.x = mouse.targetX;
            prevMouse.y = mouse.targetY;
            mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
            velocity.x = (mouse.targetX - prevMouse.x) * 2;
            velocity.y = (mouse.targetY - prevMouse.y) * 2;
        });

        document.addEventListener('touchmove', (e) => {
            autoInitAudio();
            const touch = e.touches[0];
            prevMouse.x = mouse.targetX;
            prevMouse.y = mouse.targetY;
            mouse.targetX = (touch.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(touch.clientY / window.innerHeight) * 2 + 1;
            velocity.x = (mouse.targetX - prevMouse.x) * 2;
            velocity.y = (mouse.targetY - prevMouse.y) * 2;
        }, { passive: true });

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);
        const light1 = new THREE.DirectionalLight(0xff6b6b, 1.5);
        light1.position.set(2, 3, 4);
        scene.add(light1);
        const light2 = new THREE.DirectionalLight(0x4a6bff, 0.8);
        light2.position.set(-3, -1, 2);
        scene.add(light2);

        // --- SURFACE SAMPLING FUNCTION ---
        function sampleSurface(geometry, numParticles = 10000) {
            const posAttr = geometry.attributes.position;
            if (!posAttr) return null;

            const positions = posAttr.array;
            const vertexCount = positions.length / 3;

            const indexAttr = geometry.index;
            let triangles = [];

            if (indexAttr) {
                const indices = indexAttr.array;
                for (let i = 0; i < indices.length; i += 3) {
                    triangles.push([
                        indices[i] * 3,
                        indices[i + 1] * 3,
                        indices[i + 2] * 3
                    ]);
                }
            } else {
                for (let i = 0; i < positions.length; i += 9) {
                    triangles.push([i, i + 3, i + 6]);
                }
            }

            console.log(`📐 Found ${triangles.length} triangles`);

            const sampledPoints = [];
            const triangleCount = triangles.length;
            const samplesPerTriangle = Math.max(1, Math.floor(numParticles / triangleCount));
            const totalSamples = Math.min(numParticles, triangleCount * samplesPerTriangle);

            for (let t = 0; t < triangleCount && sampledPoints.length / 3 < totalSamples; t++) {
                const [i1, i2, i3] = triangles[t];
                const v1 = new THREE.Vector3(positions[i1], positions[i1 + 1], positions[i1 + 2]);
                const v2 = new THREE.Vector3(positions[i2], positions[i2 + 1], positions[i2 + 2]);
                const v3 = new THREE.Vector3(positions[i3], positions[i3 + 1], positions[i3 + 2]);

                const samplesOnTriangle = Math.min(
                    samplesPerTriangle,
                    Math.ceil((totalSamples - sampledPoints.length / 3) / (triangleCount - t))
                );

                for (let s = 0; s < samplesOnTriangle; s++) {
                    let u = Math.random();
                    let v = Math.random();
                    if (u + v > 1) {
                        u = 1 - u;
                        v = 1 - v;
                    }
                    const w = 1 - u - v;
                    const point = new THREE.Vector3()
                        .addScaledVector(v1, u)
                        .addScaledVector(v2, v)
                        .addScaledVector(v3, w);
                    sampledPoints.push(point.x, point.y, point.z);
                }
            }

            console.log(`✅ Sampled ${sampledPoints.length / 3} surface points`);
            return sampledPoints;
        }

        // --- CREATE PARTICLE SYSTEM FROM SAMPLED POINTS ---
        function createParticlesFromPoints(points) {
            const count = points.length / 3;
            const colors = [];
            const sizes = [];
            const particleData = [];

            const deepRed = { r: 0.6, g: 0.0, b: 0.0 };

            for (let i = 0; i < count; i++) {
                colors.push(deepRed.r, deepRed.g, deepRed.b);
                sizes.push(0.05 + Math.random() * 0.045);

                particleData.push({
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.5 + Math.random() * 1.5,
                    amplitude: 0.005 + Math.random() * 0.02,
                    originalColor: [deepRed.r, deepRed.g, deepRed.b]
                });
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            const posArray = geometry.attributes.position.array;
            const origPositions = new Float32Array(posArray);
            geometry.userData.origPositions = origPositions;
            geometry.userData.particleData = particleData;

            return geometry;
        }

        // --- SHADERS ---
        const vertexShader = `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            void main() {
                vec2 center = gl_PointCoord - vec2(0.5);
                float dist = length(center);
                if (dist > 0.5) discard;
                float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                gl_FragColor = vec4(vColor, alpha);
            }
        `;

        const material = new THREE.ShaderMaterial({
            uniforms: {},
            vertexShader,
            fragmentShader,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending,
        });

        // --- LOAD MODEL AND GENERATE PARTICLES ---
        let particleSystem = null;
        let modelGroup = new THREE.Group();
        scene.add(modelGroup);

        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');

        const MODEL_SCALE = 1.8;
        const modelUrl = 'https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/android_embryo_original_concept.glb';

        console.log(`📦 Loading model from: ${modelUrl}`);

        loader.load(
            modelUrl,
            (gltf) => {
                const model = gltf.scene;
                console.log('✅ Model loaded successfully!');

                model.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
                model.position.set(0, 0, 0);
                model.updateMatrixWorld(true);

                let allPoints = [];

                model.traverse((node) => {
                    if (node.isMesh) {
                        console.log(`🔄 Processing mesh: ${node.name || 'unnamed'}`);
                        const geo = node.geometry.clone();
                        geo.applyMatrix4(node.matrixWorld);
                        const points = sampleSurface(geo, 8000);
                        if (points) {
                            allPoints = allPoints.concat(points);
                        }
                    }
                });

                console.log(`📊 Total points collected: ${allPoints.length / 3}`);

                if (allPoints.length > 0) {
                    const particleGeo = createParticlesFromPoints(allPoints);
                    particleSystem = new THREE.Points(particleGeo, material);
                    modelGroup.add(particleSystem);

                    loadingDiv.style.display = 'none';
                    console.log(`✅ Created particle system with ${allPoints.length / 3} particles`);
                } else {
                    loadingDiv.innerHTML = '⚠️ No surface points generated from model';
                    loadingDiv.className = 'loading error';
                }
            },
            (xhr) => {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                loadingDiv.innerHTML = `Loading 3D Model... ${percent}%<span>Sampling surface...</span>`;
            },
            (error) => {
                console.error('❌ Error loading model:', error);
                loadingDiv.innerHTML = '⚠️ Failed to load model.<span>Check console for details</span>';
                loadingDiv.className = 'loading error';
            }
        );

        // --- ANIMATION ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            mouse.x += (mouse.targetX - mouse.x) * 0.05;
            mouse.y += (mouse.targetY - mouse.y) * 0.05;

            velocity.x *= 0.9;
            velocity.y *= 0.9;

            if (particleSystem) {
                const positions = particleSystem.geometry.attributes.position.array;
                const orig = particleSystem.geometry.userData.origPositions;
                const colors = particleSystem.geometry.attributes.color.array;
                const particleData = particleSystem.geometry.userData.particleData;

                const mouseX3D = mouse.x * 1.5 * MODEL_SCALE;
                const mouseY3D = mouse.y * 1.2 * MODEL_SCALE;

                let maxInteraction = 0;

                for (let i = 0; i < positions.length; i += 3) {
                    const idx = i / 3;
                    const origX = orig[i];
                    const origY = orig[i + 1];
                    const origZ = orig[i + 2];

                    const dx = origX - mouseX3D;
                    const dy = origY - mouseY3D;
                    const dz = origZ;
                    const distToMouse = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    const mouseRadius = 0.8 * MODEL_SCALE;
                    const mouseStrength = 2;
                    let mouseInfluence = 0;
                    let mouseDirectionX = 0;
                    let mouseDirectionY = 0;

                    if (distToMouse < mouseRadius) {
                        const force = (1 - distToMouse / mouseRadius) * mouseStrength;
                        mouseInfluence = force;
                        maxInteraction = Math.max(maxInteraction, mouseInfluence);
                        if (distToMouse > 0.001) {
                            mouseDirectionX = dx / distToMouse;
                            mouseDirectionY = dy / distToMouse;
                        }
                    }

                    const windStrength = 0.00;
                    const windX = velocity.x * windStrength * MODEL_SCALE;
                    const windY = velocity.y * windStrength * MODEL_SCALE;

                    const data = particleData[idx];
                    const phase = data.phase + time * data.speed;
                    const dist = Math.sqrt(origX*origX + origY*origY + origZ*origZ);
                    const ripple = Math.sin(dist * 5 - time * 1.2 + phase) * data.amplitude * 2 * MODEL_SCALE;
                    const wave = Math.sin(origX * 4 + origZ * 3 + time * 1.8) * 0.008 * MODEL_SCALE;
                    const breathe = Math.sin(time * 0.5 + dist * 2 + phase * 0.3) * 0.006 * MODEL_SCALE;

                    const displaceX = ripple * origX * 0.3 + wave * origZ * 0.5 + breathe * origX;
                    const displaceY = ripple * origY * 0.3 + wave * origX * 0.3 + breathe * origY * 1.2;
                    const displaceZ = ripple * origZ * 0.3 + wave * origX * 0.4 + breathe * origZ;

                    const pushX = mouseDirectionX * mouseInfluence * 0.5;
                    const pushY = mouseDirectionY * mouseInfluence * 0.5;

                    const windEffectX = windX * (1 + origY * 0.5);
                    const windEffectY = windY * (1 + origX * 0.5);

                    positions[i] = origX + displaceX + pushX + windEffectX;
                    positions[i + 1] = origY + displaceY + pushY + windEffectY;
                    positions[i + 2] = origZ + displaceZ + pushX * 0.3 + windEffectX * 0.2;

                    const baseR = data.originalColor[0];
                    const baseG = data.originalColor[1];
                    const baseB = data.originalColor[2];

                    colors[i] = baseR;
                    colors[i + 1] = baseG;
                    colors[i + 2] = baseB;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleSystem.geometry.attributes.color.needsUpdate = true;

                // 🎵 PLAY SOUND
                if (maxInteraction > 0.1) {
                    const intensity = Math.min(1, maxInteraction * 0.5);
                    playInteractionSound(intensity);
                }
            }

            modelGroup.rotation.y = Math.sin(time * 0.06) * 0.15 + mouse.x * 0.35;
            modelGroup.rotation.x = Math.sin(time * 0.04 + 0.5) * 0.06 + mouse.y * 0.2;
            modelGroup.rotation.z = -velocity.x * 0.02;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        console.log('✨ Demons at top, Mother at bottom!');
        console.log('🔗 Click "demons" to go to:', DEMONS_URL);
        console.log('🔊 Particle sound URL:', SOUND_URL);
        console.log('🔊 Background sound URL:', BG_SOUND_URL);
        console.log('🔊 Click sound URL:', CLICK_SOUND_URL);
        console.log('📌 Click "the mother" to toggle background sound!');
    </script>
</body>
</html>
