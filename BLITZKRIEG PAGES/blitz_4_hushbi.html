<HTML>
<HEAD>
   <META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=iso-8859-1">
   <META NAME="Author" CONTENT="HMLTD">
   <META NAME="GENERATOR" CONTENT="Microsoft FrontPage 5.0">
   <TITLE>HUSHBI</TITLE>

   <style>
   body {
     margin: 0;
     height: 100vh;
     overflow: hidden;
     background-repeat: no-repeat;
     background-size: cover;
   }

   .moving-container {
     position: absolute;
     width: 300px;
     height: auto;
     animation-duration: 20s;
     animation-iteration-count: infinite;
     animation-timing-function: linear;
     cursor: pointer;
   }

   .moving-container img {
     width: 100%;
     height: auto;
     display: block;
     pointer-events: none;
   }

   .image-text {
     position: absolute;
     top: 50%;
     left: 50%;
     transform: translate(-50%, -50%);
     color: white;
     font-size: 16px;
     font-family: times, serif;
     font-style: italic;
     text-align: center;
     pointer-events: none;
     width: 90%;
     z-index: 5;
   }

   @keyframes moveSquare {
     0%   { top: 10%; left: 10%; }
     25%  { top: 10%; left: calc(90% - 300px); }
     50%  { top: calc(90% - 300px); left: calc(90% - 300px); }
     75%  { top: calc(90% - 300px); left: 10%; }
     100% { top: 10%; left: 10%; }
   }

   .image1 { animation-name: moveSquare; }
   .image2 { animation-name: moveSquare; animation-delay: -5s; }
   .image3 { animation-name: moveSquare; animation-delay: -10s; }
   .image4 { animation-name: moveSquare; animation-delay: -15s; }

   .text-overlay {
     position: absolute;
     top: 50%;
     left: 50%;
     transform: translate(-50%, -50%);
     text-align: center;
     color: white;
     font-size: 13px;
     font-family: Garamond, serif;
     z-index: 10;
     width: 80%;
   }
   .text-overlay a {
     color: white;
     text-decoration: none;
     display: inline-block;
     padding: 10px 20px;
   }
   </style>

</HEAD>

<BODY BACKGROUND="https://raw.githubusercontent.com/duckidouk/WEBSITE/refs/heads/main/CONTENT/darkdark_house.jpg" TEXT="#000000" BGCOLOR="#FFFFFF" LINK="#000080" VLINK="#000080" ALINK="#000080">

   <!-- AUDIO FOR EACH IMAGE -->
   <audio id="audio1" src="https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_ld_everybreath.mp3"></audio>
   <audio id="audio2" src="https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_ld_shelooks.mp3"></audio>
   <audio id="audio3" src="https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_ld_feelthevoid.mp3"></audio>
   <audio id="audio4" src="https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_ld_thelife.mp3"></audio>

   <!-- CENTER AUDIO (for center text) -->
   <audio id="centerAudio" src="https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_ohma.mp3"></audio>

   <!-- DEFAULT AUDIO (for random clicks) -->
   <audio id="defaultAudio" src="https://raw.githubusercontent.com/duckidouk/WEBSITE/main/CONTENT/sounds/blitz_808down.mp3"></audio>

   <script>
   var defaultAudio = document.getElementById('defaultAudio');

   // Preload all audio files
   window.addEventListener('load', function() {
     document.querySelectorAll('audio').forEach(function(audio) {
       audio.load();
     });
   });

   // Play specific audio for each image
   function playAudio(audioId) {
     var audio = document.getElementById(audioId);
     audio.currentTime = 0;
     audio.play();
   }

   // Play center audio and navigate
   function handleCenterClick(event) {
     event.preventDefault(); // Stop navigation immediately

     var audio = document.getElementById('centerAudio');
     audio.currentTime = 0;
     audio.play();

     // Navigate after a small delay to let audio start
     setTimeout(function() {
       window.location.href = 'blitzkrieg_landing.html';
     }, 900);
   }

   // Play default audio on random clicks (blank space)
   document.addEventListener('click', function(event) {
     var isMovingContainer = event.target.closest('.moving-container');
     var isCenterText = event.target.closest('.text-overlay');
     var isLink = event.target.closest('a');

     if (!isMovingContainer && !isCenterText && !isLink) {
       defaultAudio.currentTime = 0;
       defaultAudio.play();
     }
   });
   </script>

   <!-- MOVING IMAGE 1 (Top Left) -->
   <div class="moving-container image1" onclick="playAudio('audio1')">
     <img src="https://raw.githubusercontent.com/duckidouk/WEBSITE/refs/heads/main/CONTENT/apple_knife.png">
     <div class="image-text">with every breath she takes</div>
   </div>

   <!-- MOVING IMAGE 2 (Top Right) -->
   <div class="moving-container image2" onclick="playAudio('audio2')">
     <img src="https://raw.githubusercontent.com/duckidouk/WEBSITE/refs/heads/main/CONTENT/chain.png">
     <div class="image-text">she looks at me i fall in love</div>
   </div>

   <!-- MOVING IMAGE 3 (Bottom Right) -->
   <div class="moving-container image3" onclick="playAudio('audio3')">
     <img src="https://raw.githubusercontent.com/duckidouk/WEBSITE/refs/heads/main/CONTENT/drugs.png">
     <div class="image-text">i feel the void inside me open up</div>
   </div>

   <!-- MOVING IMAGE 4 (Bottom Left) -->
   <div class="moving-container image4" onclick="playAudio('audio4')">
     <img src="https://raw.githubusercontent.com/duckidouk/WEBSITE/refs/heads/main/CONTENT/TV.png">
     <div class="image-text">the life i have is not enough</div>
   </div>

   <!-- CENTER TEXT - plays audio, THEN navigates -->
   <div class="text-overlay">
     <a href="blitzkrieg_landing.html" onclick="handleCenterClick(event);">
       the true form of the night time
     </a>
   </div>

</BODY>
</HTML>
