<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>II. Nammu - 3D Model Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        .info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 2px;
            text-align: center;
            pointer-events: none;
            font-weight: 300;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            letter-spacing: 2px;
            font-family: sans-serif;
            z-index: 10;
            text-align: center;
        }
        .loading span {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="loading" id="loading">
        Loading 3D Model...
        <span>FlightHelmet.gltf from three.js examples</span>
    </div>
    <div class="info">move your mouse · the womb responds</div>

    <!-- Import Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        // ✅ Add this import at the top
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // --- SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- MOUSE TRACKING ---
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        document.addEventListener('mousemove', (e) => {
            mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouse.targetX = (touch.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(touch.clientY / window.innerHeight) * 2 + 1;
        }, { passive: true });

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const light1 = new THREE.DirectionalLight(0xff6b6b, 1.5);
        light1.position.set(2, 3, 4);
        light1.castShadow = true;
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0x4a6bff, 0.8);
        light2.position.set(-3, -1, 2);
        scene.add(light2);

        const light3 = new THREE.PointLight(0xff3366, 0.5, 10);
        light3.position.set(0, 2, 0);
        scene.add(light3);

        // --- HELPER: Create a womb-shaped point cloud ---
        function createWombParticles(count = 3500) {
            const positions = [];
            const colors = [];
            const sizes = [];

            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                let r = 1.2 + Math.random() * 0.3;
                const stretch = 1 + 0.3 * (Math.sin(phi) * 0.5 + 0.5);

                let x = r * Math.sin(phi) * Math.cos(theta) * stretch * 0.9;
                let y = r * Math.cos(phi) * 1.3;
                let z = r * Math.sin(phi) * Math.sin(theta) * stretch * 0.7;

                const noise = (Math.random() - 0.5) * 0.15;
                x += noise * 0.3;
                y += noise * 0.3;
                z += noise * 0.3;

                if (Math.random() < 0.15) {
                    const clusterAmount = 0.4;
                    x += (Math.random() - 0.5) * clusterAmount;
                    y += Math.random() * clusterAmount * 0.8 + 0.3;
                    z += (Math.random() - 0.5) * clusterAmount;
                }

                positions.push(x, y, z);

                const colorChoice = Math.random();
                let rCol, gCol, bCol;
                if (colorChoice < 0.5) {
                    rCol = 0.8 + Math.random() * 0.2;
                    gCol = 0.15 + Math.random() * 0.2;
                    bCol = 0.2 + Math.random() * 0.25;
                } else if (colorChoice < 0.8) {
                    rCol = 0.9 + Math.random() * 0.1;
                    gCol = 0.3 + Math.random() * 0.2;
                    bCol = 0.4 + Math.random() * 0.2;
                } else {
                    rCol = 0.95 + Math.random() * 0.05;
                    gCol = 0.05 + Math.random() * 0.1;
                    bCol = 0.05 + Math.random() * 0.1;
                }

                const brightness = 0.7 + Math.random() * 0.3;
                colors.push(rCol * brightness, gCol * brightness, bCol * brightness);
                sizes.push(0.06 + Math.random() * 0.08);
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            const posArray = geometry.attributes.position.array;
            const origPositions = new Float32Array(posArray);
            geometry.userData.origPositions = origPositions;

            return geometry;
        }

        // --- CREATE WOMB PARTICLES ---
        const wombGeometry = createWombParticles(4000);

        // Custom shader material for glowing particles
        const vertexShader = `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (400.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            void main() {
                vec2 center = gl_PointCoord - vec2(0.5);
                float dist = length(center);
                if (dist > 0.5) discard;
                float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                float glow = exp(-dist * 8.0);
                gl_FragColor = vec4(vColor * (0.8 + glow * 0.4), alpha * 0.9);
            }
        `;

        const material = new THREE.ShaderMaterial({
            uniforms: {},
            vertexShader,
            fragmentShader,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });

        const wombPoints = new THREE.Points(wombGeometry, material);
        scene.add(wombPoints);

        // --- LOAD 3D MODEL (FlightHelmet) ---
        let loadedModel = null;
        const loadingDiv = document.getElementById('loading');

        // ✅ This is the loader you wanted to use
        const loader = new GLTFLoader();

        // ✅ This loads the FlightHelmet model
        loader.load(
            'https://threejs.org/examples/models/gltf/FlightHelmet/glTF/FlightHelmet.gltf',
            (gltf) => {
                // ✅ This is the success callback
                loadedModel = gltf.scene;

                // Scale and position the model
                loadedModel.scale.set(0.4, 0.4, 0.4);
                loadedModel.position.set(0, -0.2, 0);

                // Make it cast shadows
                loadedModel.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                        // Make materials more reactive to light
                        if (node.material) {
                            node.material.metalness = 0.3;
                            node.material.roughness = 0.6;
                        }
                    }
                });

                scene.add(loadedModel);
                loadingDiv.style.display = 'none';
                console.log('✅ FlightHelmet model loaded successfully!');
            },
            (xhr) => {
                // ✅ Progress callback
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                loadingDiv.innerHTML = `Loading 3D Model... ${percent}%<span>FlightHelmet.gltf from three.js examples</span>`;
            },
            (error) => {
                // ✅ Error callback
                console.error('❌ Error loading model:', error);
                loadingDiv.innerHTML = '⚠️ Failed to load model.<span>Check console for details</span>';
                loadingDiv.style.color = 'rgba(255, 100, 100, 0.8)';
            }
        );

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            mouse.x += (mouse.targetX - mouse.x) * 0.05;
            mouse.y += (mouse.targetY - mouse.y) * 0.05;

            // --- ANIMATE WOMB PARTICLES ---
            const wombPos = wombGeometry.attributes.position.array;
            const wombOrig = wombGeometry.userData.origPositions;

            const waveX = mouse.x * 0.3;
            const waveY = mouse.y * 0.3;

            for (let i = 0; i < wombPos.length; i += 3) {
                const origX = wombOrig[i];
                const origY = wombOrig[i + 1];
                const origZ = wombOrig[i + 2];

                const distFromCenter = Math.sqrt(origX * origX + origY * origY + origZ * origZ);
                const ripple = Math.sin(distFromCenter * 8 - time * 1.5 + waveX * 2) * 0.03;

                const mouseInfluence = 0.06;
                const influenceX = mouse.x * 0.2 * (1 + origY * 0.5);
                const influenceY = mouse.y * 0.2 * (1 + origX * 0.5);

                const breathe = Math.sin(time * 0.5 + distFromCenter * 2) * 0.008;

                wombPos[i] = origX + ripple * origX * 0.5 + influenceX * 0.3 + breathe * origX;
                wombPos[i + 1] = origY + ripple * origY * 0.5 + influenceY * 0.3 + breathe * origY * 1.2;
                wombPos[i + 2] = origZ + ripple * origZ * 0.5 + influenceX * 0.2 + breathe * origZ;
            }
            wombGeometry.attributes.position.needsUpdate = true;

            // --- ANIMATE 3D MODEL ---
            if (loadedModel) {
                // Gentle floating
                loadedModel.position.y = Math.sin(time * 0.3) * 0.03 - 0.2;

                // React to mouse
                loadedModel.rotation.y = Math.sin(time * 0.08) * 0.3 + mouse.x * 0.3;
                loadedModel.rotation.x = Math.sin(time * 0.05 + 0.5) * 0.1 + mouse.y * 0.15;

                // Subtle scale breathing
                const breatheScale = 1 + Math.sin(time * 0.8) * 0.01;
                loadedModel.scale.x = 0.4 * breatheScale;
                loadedModel.scale.y = 0.4 * breatheScale;
                loadedModel.scale.z = 0.4 * breatheScale;
            }

            // --- ROTATE WOMB ---
            wombPoints.rotation.y = Math.sin(time * 0.08) * 0.3;
            wombPoints.rotation.x = Math.sin(time * 0.05 + 0.5) * 0.1;

            renderer.render(scene, camera);
        }

        animate();

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        console.log('✨ Womb with 3D model running!');
        console.log('📦 Loading FlightHelmet model from three.js examples');
    </script>
</body>
</html>
